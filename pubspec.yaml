name: medgate_mobile
description: "Application mobile pour la gestion des entrées/sorties hospitalières au Cameroun."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.0
  web_socket_channel: ^3.0.0
  mobile_scanner: ^5.2.3
  google_mlkit_text_recognition: ^0.14.0
  camera: ^0.11.0
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  permission_handler: ^11.3.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
